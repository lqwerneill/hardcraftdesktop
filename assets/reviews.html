<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывы | HandCraft</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <!-- Общая шапка сайта -->
    <header>
        <nav>
            <a href="../index.html" class="logo">HANDCRAFT</a>`r`n            <button class="burger" id="burger" type="button" aria-label="Открыть меню" aria-expanded="false">☰</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="../index.html">Главная</a></li>
                <li><a href="./catalog.html">Каталог</a></li>
                <li><a href="./reviews.html">Отзывы</a></li>
                <li><a href="./cart.html">Корзина</a></li>
                <li class="nav-dropdown">
                    <button class="nav-dropdown-toggle" type="button" aria-expanded="false">Ещё ▾</button>
                    <ul class="nav-dropdown-menu">
                        <li><a href="../index.html#home-catalog">Популярные</a></li>
                        <li><a href="../index.html#furniture-order-form">Заказ мебели</a></li>
                        <li><a href="../index.html#contacts-section">Контакты</a></li>`r`n`r`n            </ul>
                </li>`r`n`r`n            </ul>
        </nav>
    </header>

    <!-- Раздел отзывов -->
    <main class="container fade-in">
        <h1>Отзывы клиентов</h1>

        <!-- Список отзывов формируется в main.js -->
        <div id="reviews-list" style="margin-top:2rem;"></div>

        <section class="reviews-layout">
            <!-- Форма добавления нового отзыва -->
            <div class="form-container reviews-form">
                <h3>Оставить отзыв</h3>
                <input type="text" id="rev-name" placeholder="Ваше имя" style="width:100%; margin-bottom:10px; padding:10px;">
                <select id="rev-rating" style="width:100%; margin-bottom:10px; padding:10px;">
                    <option value="5">5 из 5</option>
                    <option value="4">4 из 5</option>
                    <option value="3">3 из 5</option>
                    <option value="2">2 из 5</option>
                    <option value="1">1 из 5</option>
                </select>
                <div class="review-rating-preview" id="rev-rating-stars" aria-label="Выбранная оценка"></div>
                <textarea id="rev-text" placeholder="Текст отзыва..." style="width:100%; margin-bottom:10px; padding:10px;"></textarea>
                <button class="btn" id="add-review-btn">Отправить</button>
            </div>
        </section>

        <h2 style="margin-top:4rem;">Мы на карте</h2>
        <!-- Контейнер Google карты -->
        <div id="map"></div>
    </main>

    <script src="./scripts/main.js"></script>
</body>
</html>
