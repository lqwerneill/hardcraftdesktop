<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | HandCraft</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <!-- Общая шапка сайта -->
    <header>
        <nav>
            <a href="../index.html" class="logo">HANDCRAFT</a>
            <button class="burger" id="burger" type="button" aria-label="Открыть меню" aria-expanded="false">☰</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="../index.html">Главная</a></li>
                <li><a href="./catalog.html">Каталог</a></li>
                <li><a href="./reviews.html">Отзывы</a></li>
                <li><a href="./cart.html">Корзина</a></li>
                <li class="nav-dropdown">
                    <button class="nav-dropdown-toggle" type="button" aria-expanded="false">Ещё ▾</button>
                    <ul class="nav-dropdown-menu">
                        <li><a href="../index.html#home-catalog">Популярные</a></li>
                        <li><a href="../index.html#furniture-order-form">Заказ мебели</a></li>
                        <li><a href="../index.html#contacts-section">Контакты</a></li>
                    </ul>
                </li>
                <li class="nav-theme-item">
                    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Переключить тему">🌙</button>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Каталог: фильтры и сетка товаров -->
    <main class="container fade-in">
        <span class="section-kicker">Полная коллекция</span>
        <h1 style="margin-bottom: 1rem;">Наш каталог</h1>
        <p class="section-text section-text-wide">Выбирайте мебель по категории, используйте поиск по названию и сортировку по цене или алфавиту.</p>

        <!-- Панель фильтрации и сортировки -->
        <div class="catalog-toolbar fade-in">
            <div class="catalog-filter-block">
                <span class="catalog-toolbar-label">Категории</span>
                <div class="category-pills" id="catalog-categories" data-active-category="Все"></div>
            </div>
            <div class="catalog-controls">
                <div class="catalog-control">
                    <label for="catalog-search">Поиск</label>
                    <input type="text" id="catalog-search" placeholder="Например: стол, диван, кровать">
                </div>
                <div class="catalog-control">
                    <label for="catalog-sort">Сортировка</label>
                    <select id="catalog-sort">
                        <option value="default">По умолчанию</option>
                        <option value="price-asc">Цена: по возрастанию</option>
                        <option value="price-desc">Цена: по убыванию</option>
                        <option value="name-asc">Название: А-Я</option>
                        <option value="name-desc">Название: Я-А</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Карточки подгружаются из main.js -->
        <div class="grid" id="catalog-grid"></div>
    </main>

    <script src="./scripts/main.js"></script>
</body>
</html>
